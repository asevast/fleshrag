# Fleshrag Workflow Multi Service Feature Or Integration Update

## Action

Follow the multi-service-feature-or-integration-update workflow:
1. Update backend service code (e.g., API, indexer, db, config)
2. Update or add Dockerfiles and docker-compose.yml for new/changed services
3. Update environment files (.env, .env.example)
4. Update or add frontend components as needed
5. Add or update tests (integration, smoke)
6. Update documentation if relevant
7. Update .gitignore for new directories or files

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: backend/app/api/*.py, backend/app/indexer/*.py, backend/app/db/*.py

